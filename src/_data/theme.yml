heading_font: Inria Sans
heading_font_file: null
content_font: Inria Sans
content_font_file: null
logo_font: Inria Sans
logo_font_file: null
button_rounding: rounded
image_rounding: rounded
container_rounding: rounded
_inputs:
  heading_font:
    comment: >-
      Write the name of any font from
      [https://fonts.google.com/](https://fonts.google.com/) in data/fonts to
      access it here. Note: fonts needs to have at least style 400 and 700
      available
    type: select
    options:
      allow_create: true
      values: data.fonts
  content_font:
    comment: >-
      Write the name of any font from
      [https://fonts.google.com/](https://fonts.google.com/) in data/fonts to
      access it here. Note: fonts needs to have at least style 400 and 700
      available
    type: select
    options:
      allow_create: true
      values: data.fonts
  logo_font:
    comment: >-
      Write the name of any font from
      [https://fonts.google.com/](https://fonts.google.com/) in data/fonts to
      access it here. Note: fonts needs to have at least style 400 and 700
      available
    type: select
    options:
      allow_create: true
      values: data.fonts
  heading_font_file:
    type: file
    options:
      empty_type: string
      accepts_mime_types:
        - font/ttf
        - font/otf
        - font/woff
        - font/woff2
        - application/font-woff
        - application/font-woff2
  content_font_file:
    type: file
    options:
      empty_type: string
      accepts_mime_types:
        - font/ttf
        - font/otf
        - font/woff
        - font/woff2
        - application/font-woff
        - application/font-woff2
  logo_font_file:
    type: file
    options:
      empty_type: string
      accepts_mime_types:
        - font/ttf
        - font/otf
        - font/woff
        - font/woff2
        - application/font-woff
        - application/font-woff2
  textColor:
    type: color
  backgroundColor:
    type: color
  primaryColor:
    type: color
  secondaryColor:
    type: color
  accentColor:
    type: color
  button_rounding:
    comment: >-
      This will change the rounding of all the buttons on the site. Each option
      mentions which brand it is best suited for, and how many pixels of
      rounding is applied. The brand mentioned is just what is commonly used,
      but not rule
    type: select
    options:
      allow_empty: false
      value_key: id
      preview:
        text:
          - key: name
        icon:
          - key: icon
      values:
        - id: rounded-none
          name: None - Formal / Luxury (0px)
        - id: rounded-sm
          name: Rounded Small - Techie (2px)
        - id: rounded
          name: Rounded - Clean and simple (4px)
        - id: rounded-md
          name: Rounded Medium - Friendly (6px)
        - id: rounded-lg
          name: Rounded Large - Friendly/Quirky (8px)
        - id: rounded-xl
          name: Rounded Extra Large - Quirky (12px)
        - id: rounded-full
          name: Rounded Full - Very Quirky (Circular)
  image_rounding:
    type: select
    comment: >-
      This will change the rounding of all the images on the site. Each option
      mentions which brand it is best suited for, and how many pixels of
      rounding is applied. The brand mentioned is just what is commonly used,
      but not rule
    options:
      allow_empty: false
      value_key: id
      preview:
        text:
          - key: name
        icon:
          - key: icon
      values:
        - id: rounded-none
          name: None - Formal / Luxury (0px)
        - id: rounded-sm
          name: Rounded Small - Techie (2px)
        - id: rounded
          name: Rounded - Clean and simple (4px)
        - id: rounded-md
          name: Rounded Medium - Friendly (6px)
        - id: rounded-lg
          name: Rounded Large - Friendly/Quirky (8px)
        - id: rounded-xl
          name: Rounded Extra Large - Quirky (12px)
  container_rounding:
    type: select
    comment: >-
      This will change the rounding of all the containers (Anything  that isn't
      a button or image. e.g. cards, form input boxes, etc) on the site. Each
      option mentions which brand it is best suited for, and how many pixels of
      rounding is applied. The brand mentioned is just what is commonly used,
      but not rule
    options:
      allow_empty: false
      value_key: id
      preview:
        text:
          - key: name
        icon:
          - key: icon
      values:
        - id: rounded-none
          name: None - Formal / Luxury (0px)
        - id: rounded-sm
          name: Rounded Small - Techie (2px)
        - id: rounded
          name: Rounded - Clean and simple (4px)
        - id: rounded-md
          name: Rounded Medium - Friendly (6px)
        - id: rounded-lg
          name: Rounded Large - Friendly/Quirky (8px)
        - id: rounded-xl
          name: Rounded Extra Large - Quirky (12px)
